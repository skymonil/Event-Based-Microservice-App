name: Generic GitOps CD

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      overlay:
        required: false
        type: string
        default: 'dev'
    secrets:
      GITOPS_TOKEN:
        required: true
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: skymonil/event-microservice-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      
      - name: Update Image Digest via Kustomize
        working-directory: gitops/services/${{ inputs.service_name }}/overlays/${{ inputs.overlay }}
        run: |
          DIGEST=$(cat $GITHUB_WORKSPACE/image-digest.txt)
          kustomize edit set image skymonil/${{ inputs.service_name }}=$DIGEST

      - name: Commit & push to GitOps repo
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git add services/${{ inputs.service_name }}/overlays/${{ inputs.overlay }}/kustomization.yaml
          git commit -m "Deploy ${{ inputs.service_name }} to ${{ inputs.overlay }} via CD pipeline" || echo "No changes to commit" --allow-empty
          git push