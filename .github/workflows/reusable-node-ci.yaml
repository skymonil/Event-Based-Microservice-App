# .github/workflows/reusable-node-ci.yaml
name: Generic Node CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASSWORD:
        required: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  codeql:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - uses: pnpm/action-setup@v3
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.30.0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run dependency vulnerability scan
        run: pnpm audit --prod --audit-level high

      - name: Install Semgrep
        run: |
          python -m pip install semgrep
          pip install semgrep
      
      - name: Run Unit Tests
        run: pnpm --filter ${{ inputs.service_name }} run test
      
      - name: Run Semgrep
        run: |
          semgrep scan \
            --config .semgrep/ \
            --sarif \
            --output semgrep.sarif
            
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
      
      - name: Run Integration Tests
        run: pnpm --filter ${{ inputs.service_name }} run test:integration

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Build Docker image
        run: |
          docker build --build-arg SERVICE_NAME=${{ inputs.service_name }} -t skymonil/${{ inputs.service_name }}:${{ github.sha }} -f docker/node-service.Dockerfile . 

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
         image: skymonil/${{ inputs.service_name }}:${{ github.sha }}
         format: cyclonedx-json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
         name: ${{ inputs.service_name }}-sbom
         path: "*.json"
 
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
             image-ref: skymonil/${{ inputs.service_name }}:${{ github.sha }}
             format: table
             severity: HIGH,CRITICAL
             trivyignores: '.trivyignore'
             ignore-unfixed: true

      - name: Push image
        if: github.ref == 'refs/heads/main'
        id: push-step
        run: |
          docker push skymonil/${{ inputs.service_name }}:${{ github.sha }}
          # Capture the immutable sha256 digest string
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' skymonil/${{ inputs.service_name }}:${{ github.sha }})
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Sign the published Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          cosign sign --yes "${{ steps.push-step.outputs.digest }}"
      
      - name: Upload Image Digest Artifact
        uses: actions/upload-artifact@v4 # ✅ MUST BE v4
        with:
          name: ${{ inputs.service_name }}-digest
          path: image-digest.txt
