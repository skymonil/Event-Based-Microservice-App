# .github/workflows/reusable-node-ci.yaml
name: Generic Node CI

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
    secrets:
      DOCKER_USER:
        required: true
      DOCKER_PASSWORD:
        required: true

permissions:
  contents: read
  security-events: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.30.0
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Semgrep
        run: |
          python -m pip install semgrep
          pip install semgrep
      
      - name: Run Unit Tests
        run: pnpm --filter ${{ inputs.service_name }} run test
      
      # ✅ Fixed: Corrected indentation for 'run:' and added SARIF output generation
      - name: Run Semgrep Debug
        run: |
          cat docker/node-service.Dockerfile
          echo "================"
          cat .semgrep/docker/no-root-user.yaml
          echo "================"
          semgrep scan \
            --config .semgrep/docker/no-root-user.yaml \
            docker/node-service.Dockerfile \
            --sarif --output semgrep.sarif \
            --verbose
            
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
      
      - name: Run Integration Tests
        run: pnpm --filter ${{ inputs.service_name }} run test:integration

      # ✅ Fixed: Added command to actually create the image-digest.txt file before uploading
      - name: Build Docker image
        run: |
          docker build --build-arg SERVICE_NAME=${{ inputs.service_name }} -t skymonil/${{ inputs.service_name }}:${{ github.sha }} -f docker/node-service.Dockerfile . 
          docker inspect --format='{{index .RepoDigests 0}}' skymonil/${{ inputs.service_name }}:${{ github.sha }} > image-digest.txt

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push skymonil/${{ inputs.service_name }}:${{ github.sha }}
      
      - name: Upload Image Digest Artifact
        uses: actions/upload-artifact@v4 
        with:
          name: ${{ inputs.service_name }}-digest
          path: image-digest.txt
