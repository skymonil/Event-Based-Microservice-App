name: Inventory Service CD

on:
  workflow_run:
    workflows: ["inventory Service Pipeline"] # Must match exactly the 'name:' of your CI workflow
    types:
      - completed

jobs:
  call-cd:
    # Only run if CI was successful and was on the main branch
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    uses: ./.github/workflows/reusable-gitops-cd.yaml
    with:
      service_name: inventory-service
      overlay: dev
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}