# .github/workflows/user-service-cd.yaml
name: User Service CD

on:
  workflow_run:
    workflows: ["User Service Pipeline"] # Must match exactly the 'name:' of your CI workflow
    types:
      - completed

jobs:
  call-cd:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    uses: ./.github/workflows/reusable-gitops-cd.yaml
    with:
      service_name: user-service
      overlay: dev
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}