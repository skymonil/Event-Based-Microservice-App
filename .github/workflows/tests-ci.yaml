name: synthetic-tests-ci

on:
  push:
    branches:
      - main
    paths:
      - "tests/**"
      - ".github/workflows/tests-ci.yaml"

  pull_request:
    branches:
      - main
    paths:
      - "tests/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🟢 1. Setup pnpm (Ensures the CI runner can interact with pnpm files)
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 🟢 2. Setup Node.js with pnpm caching for faster CI runs
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'tests/pnpm-lock.yaml'

      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        if: github.ref == 'refs/heads/main'
        working-directory: tests
        run: |
          # 3. Build using the dynamic SHA tag
          docker build -t skymonil/synthetic-tests:${{ github.sha }} .
          
          # 4. Tag as 'latest'
          docker tag skymonil/synthetic-tests:${{ github.sha }} skymonil/synthetic-tests:latest
          
          # 5. Push both tags
          docker push skymonil/synthetic-tests:${{ github.sha }}
          docker push skymonil/synthetic-tests:latest