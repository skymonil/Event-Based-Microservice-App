## .github/workflows/inventory-service-ci.yaml
name: Inventory Service Pipeline

on:
  push:
    branches: [main]
    paths: ["services/inventory-service/**", "packages/**", "pnpm-lock.yaml"]

permissions:
  contents: read
  security-events: write
  actions: read
    
jobs:
  call-ci:
    uses: ./.github/workflows/reusable-node-ci.yaml
    with:
      service_name: inventory-service
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}