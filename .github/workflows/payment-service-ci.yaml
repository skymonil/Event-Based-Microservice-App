# # .github/workflows/payment-service-ci.yaml
name: Payment Service Pipeline

on:
  push:
    branches: [main]
    paths: ["services/payment-service/**", "packages/**", "pnpm-lock.yaml"]

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

jobs:
  call-ci:
    uses: ./.github/workflows/reusable-node-ci.yaml
    with:
      service_name: payment-service
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}